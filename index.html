<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="header-row">
        <div>
          <h1>Personal Task Manager</h1>
          <p class="subtitle">
            Organize priorities with a clean, reliable task list.
          </p>
        </div>
        <div class="header-actions">
          <button
            id="theme-toggle-button"
            class="secondary-button"
            type="button"
          >
            Dark mode
          </button>
          <button id="clear-button" class="secondary-button" type="button">
            Clear All
          </button>
        </div>
      </div>

      <div class="summary-row" aria-live="polite">
        <span id="summary-text" class="summary-text">No tasks yet.</span>
      </div>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="Add a new task"
          autocomplete="off"
          aria-label="New task"
        />
        <button type="submit">Add task</button>
      </form>

      <div id="message" class="message" aria-live="polite"></div>

      <section class="todo-list-section">
        <ul id="todo-list" class="todo-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
